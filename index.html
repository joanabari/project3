<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Pokédex Explorer</h1>
    <p>Browse and search for Pokémon</p>
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="Search Pokémon by name..." />
      <button id="searchBtn">Search</button>
      <button id="showAllBtn">Show All</button>
    </section>

    <section id="status" class="status"></section>

    <section id="pokemonContainer" class="pokemon-grid"></section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
